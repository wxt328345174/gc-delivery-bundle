# 客户安装清单
#
# 说明：
# 1. SOFTWARES 控制本次要安装的软件以及执行顺序。
# 2. 当前支持的软件：runtime、chromium、sunlogin
# 3. REBOOT_POLICY 支持：prompt、always、never
# 4. CHROMIUM_PASSWORD 为空时，执行时会安全提示输入密码。

SOFTWARES=("runtime" "chromium" "sunlogin")
REBOOT_POLICY="prompt"

# runtime 配置
RUNTIME_INSTALL_PATH="/wa-edge"
RUNTIME_DATA_PATH="/wa-edge/data"
RUNTIME_ETHERCAT_IFACE="en3"
RUNTIME_ETHERCAT_DRIVER="generic"

# chromium 配置
CHROMIUM_USER="gcuser"
CHROMIUM_ENABLE_AUTOLOGIN="true"
CHROMIUM_SESSION="xfce"
CHROMIUM_PASSWORD=""
