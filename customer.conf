# 客户安装清单
#
# 说明：
# 1. SOFTWARES 控制本次要安装的软件以及执行顺序。
# 2. 当前支持的软件：runtime、chromium、sunlogin、qt。
# 3. REBOOT_POLICY 支持：prompt、always、never。
# 4. Chromium 用户密码固定设置为与用户名相同，不再单独配置。
# 5. QT 采用预编译压缩包安装，客户侧不执行编译。

SOFTWARES=("runtime" "chromium" "sunlogin" "qt")
REBOOT_POLICY="prompt"

# runtime 配置
RUNTIME_INSTALL_PATH="/wa-edge"
RUNTIME_DATA_PATH="/wa-edge/data"
RUNTIME_ETHERCAT_IFACE="en3"
RUNTIME_ETHERCAT_DRIVER="generic"

# chromium 配置
CHROMIUM_USER="gcuser"
CHROMIUM_ENABLE_AUTOLOGIN="true"
CHROMIUM_SESSION="xfce"

# qt 配置
# 如需安装 Qt Creator，请先准备 packages/qt-creator-4.15.2-openeuler-aarch64.tar.gz，
# 然后将 SOFTWARES 改为包含 "qt"。
QT_INSTALL_DIR="/opt/qtcreator-4.15.2"
QT_BIN_LINK="/usr/local/bin/qtcreator"
